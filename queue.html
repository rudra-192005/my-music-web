<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SONIX — Queue</title>
  <link rel="stylesheet" href="styles/global.css"/>
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>

  <div class="main-area">
    <div class="topbar" id="topbar">
      <div class="topbar-left">
        <button class="nav-arrow" onclick="history.back()">‹</button>
        <button class="nav-arrow" onclick="history.forward()">›</button>
      </div>
      <div class="topbar-right">
        <button class="user-btn"><div class="user-av">A</div><span class="user-lbl">Alex Rivera</span></button>
      </div>
    </div>

    <div class="page-scroll" id="pageScroll">
      <div style="padding: 32px 0 0;">

        <!-- Now Playing -->
        <div class="queue-section-lbl">Now playing</div>
        <div id="nowPlayingRow"></div>

        <!-- Divider -->
        <div style="display:flex;align-items:center;gap:16px; margin:24px 0 8px;">
          <div class="queue-section-lbl" style="padding:0; margin:0;">Next in queue</div>
          <button onclick="clearQueue()" style="background:none;border:none;color:var(--text-muted);font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;padding:0;transition:color 0.2s;" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-muted)'">Clear</button>
        </div>

        <div class="tl-head">
          <div class="tl-col">#</div>
          <div class="tl-col">Title</div>
          <div class="tl-col">Album</div>
          <div class="tl-col">Genre</div>
          <div class="tl-col right">⏱</div>
        </div>
        <div id="queueList"></div>

      </div>
    </div>
  </div>

  <div id="playerMount"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="createModal" onclick="closeModalBg(event)">
  <div class="modal-box">
    <div class="modal-title">Create playlist</div>
    <input type="text" class="modal-input" id="plNameInput" placeholder="My Playlist #1"/>
    <div class="modal-acts">
      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-create-m" onclick="closeModal()">Create</button>
    </div>
  </div>
</div>

<script src="scripts/data.js"></script>
<script src="scripts/layout.js"></script>
<script src="scripts/player.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('sidebarMount').innerHTML = renderSidebar('queue');
  document.getElementById('playerMount').innerHTML = renderPlayerBar();
  renderNowPlaying();
  renderQueueList();
});

function renderNowPlaying() {
  const track = appState.queue[appState.currentTrackIndex];
  if (!track) return;
  document.getElementById('nowPlayingRow').innerHTML = `
    <div class="track-row now-playing" style="cursor:default;">
      <div class="tr-num-wrap">
        <span class="tr-num" style="display:none;"></span>
        <span class="tr-play-ico"><div class="eq"><span></span><span></span><span></span></div></span>
      </div>
      <div class="tr-info">
        <div class="tr-thumb" style="background:linear-gradient(135deg,${track.color}44,${track.color}11)">${track.emoji}</div>
        <div>
          <div class="tr-title">${track.title}</div>
          <div class="tr-artist">${track.artist}</div>
        </div>
      </div>
      <div class="tr-album">${track.album}</div>
      <div style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:0.06em;">${track.genre}</div>
      <div class="tr-dur">${track.duration}</div>
    </div>`;
}

function renderQueueList() {
  const queue = appState.queue;
  const startIdx = appState.currentTrackIndex + 1;
  const upcoming = [];
  for (let i = startIdx; i < queue.length; i++) upcoming.push({ track: queue[i], origIdx: i });
  // wrap around
  for (let i = 0; i < appState.currentTrackIndex; i++) upcoming.push({ track: queue[i], origIdx: i });

  document.getElementById('queueList').innerHTML = upcoming.map(({ track, origIdx }, i) => `
    <div class="track-row" ondblclick="jumpTo(${origIdx})">
      <div class="tr-num-wrap">
        <span class="tr-num">${i+1}</span>
        <span class="tr-play-ico">▶</span>
      </div>
      <div class="tr-info">
        <div class="tr-thumb" style="background:linear-gradient(135deg,${track.color}44,${track.color}11)">${track.emoji}</div>
        <div>
          <div class="tr-title">${track.title}</div>
          <div class="tr-artist">${track.artist}</div>
        </div>
      </div>
      <div class="tr-album">${track.album}</div>
      <div style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono);letter-spacing:0.06em;">${track.genre}</div>
      <div class="tr-dur" style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
        <button onclick="removeFrom(${origIdx})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;opacity:0;transition:opacity 0.2s;" class="remove-btn">✕</button>
        ${track.duration}
      </div>
    </div>
  `).join('');

  // hover show remove buttons
  document.querySelectorAll('.track-row').forEach(row => {
    row.addEventListener('mouseenter', () => {
      const btn = row.querySelector('.remove-btn');
      if (btn) btn.style.opacity = '1';
    });
    row.addEventListener('mouseleave', () => {
      const btn = row.querySelector('.remove-btn');
      if (btn) btn.style.opacity = '0';
    });
  });
}

function jumpTo(idx) {
  appState.currentTrackIndex = idx;
  appState.isPlaying = true;
  saveState();
  window.location.href = 'index.html';
}

function removeFrom(idx) {
  if (appState.queue.length <= 1) return;
  appState.queue.splice(idx, 1);
  if (appState.currentTrackIndex >= appState.queue.length) appState.currentTrackIndex = 0;
  saveState();
  renderQueueList();
}

function clearQueue() {
  const current = appState.queue[appState.currentTrackIndex];
  appState.queue = current ? [current] : [...TRACKS];
  appState.currentTrackIndex = 0;
  saveState();
  renderQueueList();
}

function openCreateModal() { document.getElementById('createModal').classList.add('open'); }
function closeModal() { document.getElementById('createModal').classList.remove('open'); }
function closeModalBg(e) { if(e.target===document.getElementById('createModal')) closeModal(); }
</script>
</body>
</html>
